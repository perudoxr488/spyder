<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>SpiderSyn Login</title>
  <style>
    :root { --bg:#efe3d2; --card:#fffaf2; --ink:#1e1c18; --muted:#7a6f62; --accent:#1f6f5f; --accent2:#dba34a; --line:#dbcab1; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:radial-gradient(circle at top,#f7efe2 0%,#eadcca 55%,#e2d1bd 100%); font-family:Segoe UI,sans-serif; color:var(--ink); }
    .card { width:min(440px,92vw); background:var(--card); border:1px solid var(--line); border-radius:22px; padding:28px; box-shadow:0 18px 40px rgba(0,0,0,.08); }
    h1 { margin:0 0 8px; }
    p { color:var(--muted); }
    label { display:block; font-size:13px; margin:14px 0 6px; color:var(--muted); }
    input, button { width:100%; padding:12px 14px; border-radius:14px; border:1px solid var(--line); font:inherit; box-sizing:border-box; }
    button { background:linear-gradient(135deg,var(--accent),#225247); color:#fff; border:none; font-weight:700; cursor:pointer; margin-top:16px; }
    .hint { margin-top:12px; font-size:12px; color:var(--muted); }
    .error { margin:12px 0 0; padding:10px 12px; border-radius:12px; background:#f8dfdf; color:#8a2f2f; }
  </style>
</head>
<body>
  <form class="card" method="post">
    <h1>Acceso al Panel</h1>
    <p>Ingresa con tu usuario y clave admin para editar catálogo, costos y paquetes.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <label>Usuario</label>
    <input name="username" placeholder="admin" required autofocus>
    <label>Clave</label>
    <input name="password" type="password" placeholder="••••••••" required>
    <button type="submit">Entrar al panel</button>
    <div class="hint">Solo disponible localmente en esta PC.</div>
  </form>
</body>
</html>
